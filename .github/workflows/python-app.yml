name: Regulate IE Production CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: prod-sim-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      PYTHONUNBUFFERED: "1"
      PORT: "5000"
      DB_HOST: "localhost"
      DB_PORT: "5432"
      DB_NAME: "test"
      DB_USER: "test"
      DB_PASSWORD: "test"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Show package
        run: |
          python -m pip show regulate-ie || true
          python -c "import sys; print(sys.version)"

      - name: Start app
        run: |
          set -euo pipefail
          if command -v regulate-ie >/dev/null 2>&1; then
            nohup regulate-ie > app.log 2>&1 &
          else
            nohup python -m regulate_ie > app.log 2>&1 &
          fi
          echo $! > app.pid
          echo "Started app PID $(cat app.pid)"

      - name: App ready check
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5000/regulations >/dev/null; then
              echo "App ready"
              exit 0
            fi
            sleep 2
          done
          echo "App never ready"
          cat app.log
          exit 1

      - name: App testing
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import sys
          import urllib.error
          import urllib.request

          base = "http://127.0.0.1:5000"

          def request(method, path, payload=None):
              req = urllib.request.Request(base + path, method=method)
              req.add_header("Content-Type", "application/json")
              if payload is not None:
                  req.data = json.dumps(payload).encode("utf-8")
              with urllib.request.urlopen(req, timeout=15) as resp:
                  body = resp.read().decode("utf-8")
                  return resp.status, body

          def request_allow_error(method, path, payload=None):
              try:
                  return request(method, path, payload)
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode("utf-8")

          status, body = request("POST", "/ingest", {
              "source": "source.ie",
              "content": "some data"
          })
          print("POST /ingest:", status, body)
          if status not in (200, 201, 202, 204):
              sys.exit("POST /ingest failed")

          status, body = request("GET", "/regulations")
          print("GET /regulations:", status, body)
          if status != 200:
              sys.exit("GET /regulations failed")

          reg_id = 1
          try:
              parsed = json.loads(body)
              if isinstance(parsed, dict):
                  for key in ("id", "regulation_id"):
                      if isinstance(parsed.get(key), int):
                          reg_id = parsed[key]
                          break
              elif isinstance(parsed, list) and parsed:
                  first = parsed[0]
                  if isinstance(first, dict):
                      for key in ("id", "regulation_id"):
                          if isinstance(first.get(key), int):
                              reg_id = first[key]
                              break
          except Exception:
              pass

          status, body = request_allow_error("DELETE", f"/regulations/{reg_id}")
          print(f"DELETE /regulations/{reg_id}:", status, body)
          if status not in (200, 202, 204):
              sys.exit("DELETE /regulations/<id> failed")
          PY

      - name: Dump log on failure
        if: failure()
        run: |
          if [ -f app.log ]; then
            sed -n '1,200p' app.log
          fi
