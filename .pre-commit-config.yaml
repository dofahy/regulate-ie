repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.11
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [python, pyi, pyproject]
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: debug-statements
      - id: double-quote-string-fixer
      - id: name-tests-test
      # - id: requirements-txt-fixer

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: ./node_modules/.bin/prettier
        language: system
        types_or: [markdown, yaml, json, javascript, html]
        args: [--write]
